version: "1"

metadata:
  name: ac-0
  description: >-
    Minimal acceptance scenario. Two Linux containers on one network
    segment with one normal activity (HTTP curl) and one attack
    activity (nmap port scan).

environment:
  scale: minimal
  encryption: none
  workload: light
  threat: single
  attacker: scripted

duration: 5m

infrastructure:
  hosts:
    - name: attacker-001
      os: linux
      role: attacker
      image: alpine:3.19
    - name: target-001
      os: linux
      role: target
      image: alpine:3.19
  network:
    segments:
      - name: lan
        subnet: 10.100.0.0/24
        hosts:
          - attacker-001
          - target-001

activities:
  normal:
    - name: http-health-check
      source: attacker-001
      target: target-001
      command: "curl -s http://${target_ip}:80/"
      protocol: tcp
      dst_port: 80
      start_offset: 30s
  attack:
    - name: nmap-port-scan
      source: attacker-001
      target: target-001
      command: "nmap -sS -p 80 ${target_ip}"
      protocol: tcp
      dst_port: 80
      technique: T1046
      phase: reconnaissance
      tool: nmap
      start_offset: 120s
