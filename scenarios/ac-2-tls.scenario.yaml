version: "1"

metadata:
  name: ac-2-tls
  description: >-
    TLS termination scenario. An nginx reverse proxy terminates TLS on
    the edge segment and forwards plaintext HTTP to the backend on the
    inner segment.  PCAP is captured at both vantage points so that
    edge.pcap contains encrypted flows and inner.pcap contains
    plaintext.

environment:
  scale: minimal
  encryption: tls
  workload: light
  threat: single
  attacker: scripted

duration: 5m

infrastructure:
  hosts:
    - name: attacker-001
      os: linux
      role: attacker
      image: alpine:3.19
    - name: proxy-001
      os: linux
      role: observer
      image: nginx:alpine
      setup:
        - "apk add --no-cache openssl >/dev/null 2>&1"
        - "mkdir -p /etc/nginx/ssl"
        - "openssl req -x509 -nodes -days 1 -newkey rsa:2048 -keyout /etc/nginx/ssl/key.pem -out /etc/nginx/ssl/cert.pem -subj '/CN=proxy-001' 2>/dev/null"
        - "printf 'server {\\n  listen 443 ssl;\\n  ssl_certificate /etc/nginx/ssl/cert.pem;\\n  ssl_certificate_key /etc/nginx/ssl/key.pem;\\n  location / {\\n    proxy_pass http://10.200.1.3:80;\\n  }\\n}\\n' > /etc/nginx/conf.d/default.conf"
        - "sed -i '/daemon off/d' /etc/nginx/nginx.conf && nginx"
    - name: backend-001
      os: linux
      role: target
      image: alpine:3.19
      setup:
        - "while true; do printf 'HTTP/1.0 200 OK\\r\\nContent-Length: 3\\r\\n\\r\\nok\\n' | nc -l -p 80 > /dev/null; done &"
  network:
    segments:
      - name: edge
        subnet: 10.200.0.0/24
        hosts:
          - attacker-001
          - proxy-001
        vantage_point: pre_tls_termination
      - name: inner
        subnet: 10.200.1.0/24
        hosts:
          - proxy-001
          - backend-001
        vantage_point: post_tls_termination

activities:
  normal:
    - name: https-health-check
      source: attacker-001
      target: proxy-001
      command: "curl -sk https://${target_ip}:443/"
      protocol: tcp
      dst_port: 443
      start_offset: 30s
  attack:
    - name: nmap-tls-scan
      source: attacker-001
      target: proxy-001
      command: "nmap -sS -p 443 ${target_ip}"
      protocol: tcp
      dst_port: 443
      technique: T1046
      phase: reconnaissance
      tool: nmap
      start_offset: 120s
